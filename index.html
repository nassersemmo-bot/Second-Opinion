<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Swiss Medical Second Opinion</title>
<style>
:root {
  --bg:#f3f6f8;
  --surface:#ffffff;
  --surface-soft:#f8fafc;
  --line:#dbe3e8;
  --text:#1f2b3a;
  --muted:#6c7a89;
  --accent:#0f4c81;
  --accent-dark:#0b3b63;
  --gold:#b89c67;
  --success:#25D366;
  --shadow:0 20px 60px rgba(15,23,42,.08);
  --radius-xl:28px;
  --radius-lg:22px;
  --radius-md:18px;
  --max:1180px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top right, rgba(184,156,103,.11), transparent 24%),
    linear-gradient(180deg,#f7fafb 0%,#f1f4f6 100%);
  line-height:1.6;
}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
.container{width:min(var(--max), calc(100% - 32px));margin:0 auto}
.topbar{
  position:sticky;top:0;z-index:1000;
  background:rgba(255,255,255,.86);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(31,43,58,.08);
}
.topbar-inner{min-height:92px;display:flex;align-items:center;justify-content:space-between;gap:18px}
.brand{font-size:1.02rem;font-weight:800;letter-spacing:-.02em}
.brand-sub{color:var(--muted);font-size:.92rem}
.controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.lang-label{font-size:.9rem;color:var(--muted)}
.lang-switch{display:flex;gap:8px;flex-wrap:wrap}
.lang-btn{
  border:1px solid var(--line);background:#fff;color:var(--text);
  min-width:46px;height:38px;border-radius:999px;font-size:.92rem;cursor:pointer;transition:.2s ease;
}
.lang-btn.active,.lang-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.hero{padding:38px 0 26px}
.hero-grid{display:grid;grid-template-columns:1.28fr .92fr;gap:28px;align-items:stretch}
.card{
  background:rgba(255,255,255,.94);
  border:1px solid rgba(31,43,58,.08);
  border-radius:var(--radius-xl);
  box-shadow:var(--shadow);
}
.hero-card{padding:46px 42px;position:relative;overflow:hidden}
.hero-card:before{
  content:"";position:absolute;inset:auto -90px -110px auto;width:260px;height:260px;
  background:radial-gradient(circle, rgba(184,156,103,.16), transparent 70%);pointer-events:none;
}
.eyebrow{
  display:inline-flex;align-items:center;gap:10px;padding:9px 14px;border-radius:999px;
  background:rgba(15,76,129,.07);color:var(--accent-dark);font-size:.88rem;font-weight:700;margin-bottom:18px;
}
h1,h2,h3{line-height:1.12;margin:0 0 16px;letter-spacing:-.03em}
h1{font-size:clamp(2.35rem, 4.7vw, 4.45rem);max-width:10.5ch}
h2{font-size:clamp(1.55rem, 2.2vw, 2.15rem)}
h3{font-size:1.05rem}
.lead{font-size:1.12rem;color:var(--muted);max-width:62ch;margin-bottom:26px}
.cta-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:28px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:15px 24px;
  border-radius:999px;font-weight:800;transition:.2s ease;border:1px solid transparent;cursor:pointer;
}
.btn-primary{background:linear-gradient(135deg,var(--accent),#1d5b8b);color:#fff;box-shadow:0 16px 32px rgba(15,76,129,.18)}
.btn-primary:hover{transform:translateY(-1px)}
.btn-secondary{background:#fff;border-color:var(--line);color:var(--text)}
.btn-secondary:hover{background:#f8fafc}
.hero-points{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.hero-point{background:var(--surface-soft);border:1px solid var(--line);border-radius:18px;padding:16px}
.hero-point strong{display:block;font-size:.98rem;margin-bottom:6px}
.hero-point span{color:var(--muted);font-size:.94rem}
.image-card{padding:20px;display:flex;flex-direction:column;justify-content:flex-start;background:linear-gradient(180deg,#ffffff 0%,#f7fafc 100%)}
.portrait-shell{
  border-radius:22px;background:
    radial-gradient(circle at top center, rgba(255,255,255,.82), transparent 38%),
    linear-gradient(180deg,#f8f9fb 0%,#eef2f5 100%);
  overflow:hidden;display:flex;align-items:flex-end;justify-content:center;position:relative;min-height:0;margin-bottom:16px;
}
.portrait-shell:after{content:"";position:absolute;inset:0;border-radius:22px;box-shadow:inset 0 1px 0 rgba(255,255,255,.7);pointer-events:none}
.portrait{width:100%;max-width:510px;object-fit:contain;filter:drop-shadow(0 18px 30px rgba(0,0,0,.05))}
.caption{padding:0 12px 10px;color:var(--muted);font-size:.9rem;line-height:1.45;text-align:center;overflow-wrap:anywhere}
.section{padding:20px 0}
.intro-card{padding:34px 30px}
.section-head{padding:0 4px 10px}
.section-head p{margin:0;color:var(--muted);font-size:1rem}
.acc-shell{padding:0;overflow:hidden}
.accordion-item{border-top:1px solid var(--line);background:#fff}
.accordion-item:first-child{border-top:none}
.acc-btn{
  width:100%;border:0;background:#fff;display:flex;align-items:center;justify-content:space-between;gap:16px;
  text-align:left;padding:24px;font-size:1.03rem;font-weight:800;cursor:pointer;color:var(--text)
}
.acc-btn:hover{background:#fbfcfd}
.acc-icon{
  flex:0 0 auto;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:var(--accent);background:rgba(15,76,129,.08);font-size:1.4rem;line-height:1;transition:.2s ease;
}
.accordion-item.active .acc-icon{transform:rotate(45deg)}
.acc-panel{display:none;padding:0 24px 24px;color:var(--muted);font-size:1rem}
.accordion-item.active .acc-panel{display:block}
.acc-panel p{margin:0 0 12px;white-space:pre-line}
.acc-panel ul{margin:0;padding-left:22px}
.acc-panel li{margin-bottom:8px}
.funnel-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:24px}
.funnel-card{padding:30px}
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
.chip{
  border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;cursor:pointer;
  font-weight:700;color:var(--text);transition:.2s ease
}
.chip:hover,.chip.active{background:rgba(15,76,129,.08);border-color:rgba(15,76,129,.22);color:var(--accent-dark)}
.message-box{
  border:1px solid var(--line);background:var(--surface-soft);border-radius:18px;padding:18px;min-height:150px;
}
.message-title{font-weight:800;margin-bottom:10px}
.message-text{color:var(--muted);white-space:pre-wrap}
.hint{margin-top:12px;color:var(--muted);font-size:.92rem}
.contact-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:24px}
.contact-card{padding:30px}
.list{display:grid;gap:12px;margin-top:18px}
.list div{padding:14px 16px;border-radius:16px;background:var(--surface-soft);border:1px solid var(--line)}
.notice{margin-top:18px;padding:18px;border-radius:18px;background:#fff9ea;border:1px solid #efd48b;color:#7a5d15}
.footer{padding:14px 0 42px}
.footer-card{padding:24px 26px}
.whatsapp-float{
  position:fixed;right:20px;bottom:20px;z-index:999;background:linear-gradient(135deg,#27d467,#21ba59);
  color:#fff;border-radius:999px;padding:14px 20px;font-weight:800;box-shadow:0 18px 34px rgba(37,211,102,.24)
}
.small-muted{color:var(--muted);font-size:.92rem}
html[lang="ar"] body{direction:rtl}
html[lang="ar"] .acc-btn{text-align:right}
html[lang="ar"] .acc-panel ul{padding-right:22px;padding-left:0}
html[lang="ar"] .controls{flex-direction:row-reverse}
@media (max-width:1080px){
  .hero-grid,.funnel-grid,.contact-grid{grid-template-columns:1fr}
  .hero-points{grid-template-columns:1fr}
  h1{max-width:none}
}
@media (max-width:760px){
  .topbar-inner{min-height:84px;align-items:flex-start;padding-top:16px;padding-bottom:16px}
  .hero-card{padding:32px 24px}
  .intro-card,.funnel-card,.contact-card,.footer-card{padding:24px 20px}
  .acc-btn{padding:20px}
  .acc-panel{padding:0 20px 20px}
  .whatsapp-float{right:14px;bottom:14px;padding:13px 16px}
}
</style>
</head>

</header>

let currentLang = 'de';
let activeMessageKey = 'wa_default';

function setLang(lang){
  currentLang = lang;
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if(translations[lang] && translations[lang][key]) {
      el.textContent = translations[lang][key];
    }
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  updateMessagePreview();
  updateWhatsAppLinks();
}

function getMessageText(){
  return translations[currentLang][activeMessageKey] || translations[currentLang].wa_default;
}

function buildWaLink(){
  const text = encodeURIComponent(getMessageText());
  return `https://wa.me/${CONFIG.waNumber}?text=${text}`;
}

function updateMessagePreview(){
  document.getElementById('messagePreview').textContent = getMessageText();
}

function updateWhatsAppLinks(){
  const href = buildWaLink();
  document.getElementById('ctaPrimary').href = href;
  document.getElementById('contactCta').href = href;
  document.getElementById('waFloat').href = href;
  document.getElementById('funnelCta').href = href;
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => setLang(btn.dataset.lang));
});

document.querySelectorAll('.accordion-item .acc-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.parentElement.classList.toggle('active');
  });
});

const chipMessageKeys = ['wa_diag','wa_therapy','wa_findings','wa_international'];
document.querySelectorAll('.chip').forEach((chip, idx) => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeMessageKey = chipMessageKeys[idx];
    updateMessagePreview();
    updateWhatsAppLinks();
  });
});
document.querySelector('.chip').classList.add('active');
activeMessageKey = 'wa_diag';

setLang('de');
</script>
